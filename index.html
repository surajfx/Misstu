<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Duo • Private Chat</title>
<meta name="theme-color" content="#1a1229">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Duo">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="stars"></canvas>

<!-- LOCK SCREEN -->
<div id="lockScreen" class="screen">
  <div class="lock-card">
    <div class="lock-glyph">✦</div>
    <h1 class="brand">Duo</h1>
    <p class="tagline">Just the two of us</p>

    <div class="field">
      <label>Who are you?</label>
      <div class="who-toggle">
        <button type="button" class="who-btn" data-who="a">USER_A_NAME</button>
        <button type="button" class="who-btn" data-who="b">USER_B_NAME</button>
      </div>
    </div>

    <div class="field">
      <label for="pinInput">PIN code</label>
      <input
        type="tel"
        id="pinInput"
        inputmode="numeric"
        pattern="[0-9]*"
        placeholder="••••"
        maxlength="12"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        name="duo-pin-code"
        class="pin-mask">
    </div>

    <button id="enterBtn" class="primary-btn" disabled>Enter</button>
    <p id="lockError" class="lock-error"></p>
    <button id="installBtn" class="install-btn hidden">📲 Install app</button>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chatScreen" class="screen hidden">
  <header class="chat-header">
    <div class="partner-block">
      <div class="avatar-wrap">
        <div class="avatar" id="partnerAvatar">P</div>
        <span id="onlineDot" class="online-dot"></span>
      </div>
      <div class="partner-info">
        <div class="partner-name" id="partnerName">Partner</div>
        <div class="partner-status" id="partnerStatus">Offline</div>
      </div>
    </div>
    <button id="logoutBtn" class="icon-btn" title="Log out">⎋</button>
  </header>

  <main id="messages" class="messages"></main>

  <div id="typingRow" class="typing-row hidden">
    <div class="typing-bubble">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>
  </div>

  <div id="editBanner" class="edit-banner hidden">
    <span>Editing message</span>
    <button id="cancelEdit">Cancel</button>
  </div>

  <footer class="composer">
    <input type="file" id="mediaInput" accept="image/*,video/*" hidden>
    <button id="attachBtn" class="icon-btn" title="Send photo/video">📎</button>
    <div class="input-wrap">
      <textarea id="textInput" rows="1" placeholder="Type a message..."></textarea>
    </div>
    <button id="sendBtn" class="send-btn" title="Send">➤</button>
  </footer>

  <div id="uploadProgress" class="upload-progress hidden">
    <div class="upload-bar"><div id="uploadFill" class="upload-fill"></div></div>
    <span id="uploadLabel">Uploading...</span>
  </div>
</div>

<!-- LIGHTBOX for viewing media full-screen -->
<div id="lightbox" class="lightbox hidden">
  <button id="closeLightbox" class="icon-btn lightbox-close">✕</button>
  <div id="lightboxContent" class="lightbox-content"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
